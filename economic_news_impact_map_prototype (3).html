<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Economic Flow Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }
    .shell {
      width: 100%;
      max-width: 1180px;
      min-height: 780px;
      background: rgba(255,255,255,0.98);
      border: 1px solid #e2e8f0;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(15,23,42,0.08);
      overflow: hidden;
      position: relative;
    }
    .screen {
      display: none;
      min-height: 780px;
      padding: 48px;
    }
    .screen.active { display: block; }

    .center-wrap {
      min-height: 684px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .eyebrow {
      font-size: 0.92rem;
      font-weight: 700;
      color: #2563eb;
      letter-spacing: -0.01em;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 3rem;
      line-height: 1.16;
      letter-spacing: -0.035em;
    }
    .subtext {
      max-width: 760px;
      margin: 18px auto 0;
      color: #64748b;
      font-size: 1.04rem;
      line-height: 1.8;
    }
    .guide-text {
      margin-top: 14px;
      color: #475569;
      font-size: 0.96rem;
      line-height: 1.7;
      font-weight: 500;
    }
    .input-wrap {
      width: 100%;
      max-width: 860px;
      margin-top: 34px;
      display: grid;
      gap: 14px;
      text-align: left;
    }
    .input-card {
      background: #fff;
      border: 1px solid #dbe2ea;
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.05);
    }
    .input-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: #334155;
      margin-bottom: 10px;
    }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid #e2e8f0;
      outline: none;
      border-radius: 18px;
      padding: 14px 15px;
      font-size: 0.98rem;
      color: #0f172a;
      background: #fff;
      transition: 0.18s ease;
      font-family: inherit;
    }
    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.75;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96,165,250,0.12);
    }
    .action-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: #2563eb; color: white; }
    .btn-soft { background: #eff6ff; color: #1d4ed8; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 28px;
    }
    .title-group h2 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -0.03em;
    }
    .title-group p {
      margin: 8px 0 0;
      color: #64748b;
      line-height: 1.65;
    }
    .ghost-link {
      background: transparent;
      border: none;
      color: #475569;
      font-size: 0.94rem;
      cursor: pointer;
      font-family: inherit;
    }

    .summary-card {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 18px 40px rgba(15,23,42,0.05);
    }
    .article-box {
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 22px;
    }
    .article-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 8px;
    }
    .article-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .article-sub {
      color: #64748b;
      font-size: 0.92rem;
      line-height: 1.6;
      word-break: break-all;
    }
    .bullet-list {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }
    .bullet-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 18px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .bullet-dot {
      width: 11px;
      height: 11px;
      margin-top: 8px;
      border-radius: 50%;
      background: #2563eb;
      flex-shrink: 0;
    }
    .bullet-item strong {
      display: block;
      font-size: 0.98rem;
      margin-bottom: 4px;
    }
    .bullet-item p {
      margin: 0;
      color: #475569;
      line-height: 1.7;
      font-size: 0.95rem;
    }
    .summary-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 26px;
      flex-wrap: wrap;
    }

    .prezi-layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 22px;
      align-items: stretch;
      min-height: 620px;
    }
    .canvas {
      position: relative;
      min-height: 620px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 20% 20%, rgba(37,99,235,0.08), transparent 28%),
        radial-gradient(circle at 80% 78%, rgba(56,189,248,0.08), transparent 24%),
        #ffffff;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }
    .line-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .map-node {
      position: absolute;
      width: 170px;
      padding: 14px 14px;
      border-radius: 20px;
      border: 1px solid #dbeafe;
      background: #fff;
      box-shadow: 0 10px 26px rgba(15,23,42,0.06);
      transition: 0.22s ease;
      opacity: 0.24;
      transform: scale(0.92);
    }
    .map-node.visible {
      opacity: 1;
      transform: scale(1);
    }
    .map-node.current {
      outline: 4px solid rgba(37,99,235,0.14);
      border-color: #60a5fa;
    }
    .map-node.center {
      width: 210px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border-color: transparent;
    }
    .map-node h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }
    .map-node p {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.5;
      color: #64748b;
    }
    .map-node.center p { color: rgba(255,255,255,0.82); }

    .step-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid #e2e8f0;
      border-radius: 30px;
      padding: 26px;
      background: #fff;
    }
    .step-top .mini {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .step-top h2 {
      margin: 0;
      font-size: 1.75rem;
      line-height: 1.25;
      letter-spacing: -0.03em;
    }
    .step-top p {
      margin: 14px 0 0;
      color: #475569;
      line-height: 1.8;
      font-size: 1rem;
    }
    .detail-card {
      margin-top: 22px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 22px;
      padding: 18px;
    }
    .detail-card h4 {
      margin: 0 0 10px;
      font-size: 0.95rem;
    }
    .detail-card ul {
      margin: 0;
      padding-left: 18px;
      color: #334155;
      line-height: 1.75;
      font-size: 0.94rem;
    }
    .navigator {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .progress {
      color: #64748b;
      font-size: 0.92rem;
      font-weight: 600;
    }
    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .classification-note {
      margin-top: 14px;
      text-align: center;
      color: #64748b;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .screen { padding: 28px; }
      h1 { font-size: 2.2rem; }
      .prezi-layout { grid-template-columns: 1fr; }
      .canvas { min-height: 520px; }
    }
    @media (max-width: 640px) {
      .shell { min-height: auto; border-radius: 24px; }
      .screen { padding: 22px; min-height: auto; }
      .center-wrap { min-height: 640px; }
      h1 { font-size: 1.8rem; }
      .input-card { padding: 14px; border-radius: 20px; }
      .summary-card { padding: 18px; border-radius: 22px; }
      .canvas { min-height: 460px; }
      .map-node { width: 138px; padding: 11px; }
      .map-node.center { width: 170px; }
      .step-panel { padding: 20px; border-radius: 24px; }
      .step-top h2 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <section class="screen active" id="screen-home">
        <div class="center-wrap">
          <div class="eyebrow">경제 뉴스, 연결해서 이해하기</div>
          <h1>기사 하나로<br>경제 흐름을 한눈에</h1>
          <p class="subtext">
            경제 기사의 핵심 변화와 파급효과를 더 쉽게 이해할 수 있도록 정리해주는 서비스 화면입니다.
          </p>
          <p class="guide-text">
            기사 링크와 제목, 핵심 내용을 입력한 뒤 분석하기를 누르면 핵심 경제 변화와 단계별 파급효과를 확인할 수 있습니다.
          </p>

          <div class="input-wrap">
            <div class="input-card">
              <label class="input-label" for="articleLink">기사 링크</label>
              <input id="articleLink" type="text" placeholder="https://example.com/article" value="" />
            </div>
            <div class="input-card">
              <label class="input-label" for="articleTitle">기사 제목</label>
              <input id="articleTitle" type="text" placeholder="기사 제목을 입력하세요" value="" />
            </div>
            <div class="input-card">
              <label class="input-label" for="articleContent">기사 핵심 내용</label>
              <textarea id="articleContent" placeholder="기사의 핵심 내용을 2~4문장 정도 입력해 주세요"></textarea>
            </div>
          </div>

          <div class="action-row">
            <button class="btn btn-primary" id="startAnalysis">분석하기</button>
          </div>

          <div class="classification-note" id="classificationNote"></div>
        </div>
      </section>

      <section class="screen" id="screen-summary">
        <div class="topbar">
          <div class="title-group">
            <h2>핵심 경제 변화</h2>
            <p>입력한 기사 내용을 바탕으로 가장 중요한 경제 변화만 먼저 짧고 직관적으로 정리했습니다.</p>
          </div>
          <button class="ghost-link" id="backHome1">← 처음으로</button>
        </div>

        <div class="summary-card">
          <div class="article-box">
            <div class="article-label">입력한 기사</div>
            <div class="article-title" id="summaryArticleTitle"></div>
            <div class="article-sub" id="summaryArticleLink"></div>
          </div>

          <div class="bullet-list" id="bulletList"></div>

          <div class="summary-actions">
            <button class="btn btn-soft" id="backHome2">입력 다시 하기</button>
            <button class="btn btn-primary" id="goMindmap">파급효과 보러가기</button>
          </div>
        </div>
      </section>

      <section class="screen" id="screen-mindmap">
        <div class="topbar">
          <div class="title-group">
            <h2>파급효과 따라가기</h2>
            <p>다음 버튼을 누를 때마다 연결고리가 하나씩 드러나는 방식으로 흐름을 따라갈 수 있습니다.</p>
          </div>
          <button class="ghost-link" id="backSummary">← 요약으로</button>
        </div>

        <div class="prezi-layout">
          <div class="canvas" id="canvas">
            <svg class="line-layer" id="lineLayer"></svg>
          </div>

          <div class="step-panel">
            <div>
              <div class="step-top">
                <span class="mini" id="stepTag"></span>
                <h2 id="stepTitle"></h2>
                <p id="stepDescription"></p>
              </div>

              <div class="detail-card">
                <h4>실생활 영향</h4>
                <ul id="stepImpact"></ul>
              </div>
            </div>

            <div class="navigator">
              <div class="progress" id="progressText"></div>
              <div class="nav-buttons">
                <button class="btn btn-soft" id="prevStep">이전</button>
                <button class="btn btn-primary" id="nextStep">다음</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const templates = {
      oilWar: {
        bullets: [
          { title: '핵심 사건', text: '지정학적 긴장으로 원유 공급 차질 우려가 커지면서 국제유가가 상승할 가능성이 높아졌습니다.' },
          { title: '가장 직접적인 변화', text: '에너지 가격과 운송비가 오를 가능성이 커졌고, 이는 여러 산업의 비용 부담 확대로 이어질 수 있습니다.' },
          { title: '거시경제 포인트', text: '물가가 다시 자극되면 금리 인하 기대가 약해질 수 있습니다.' }
        ],
        steps: [
          { id: 'center', type: 'center', x: 38, y: 36, title: '전쟁·지정학 리스크 확대', tag: '핵심 사건', description: '전쟁이나 군사적 긴장이 커지면 원유 생산과 운송이 차질을 빚을 수 있다는 우려가 커집니다.', impact: ['에너지 가격 변동성이 커질 수 있습니다.', '시장 불안 심리가 확대될 수 있습니다.', '에너지 수입국의 부담이 커질 수 있습니다.'] },
          { id: 'oil', parent: 'center', x: 68, y: 14, title: '국제유가 상승', tag: '1단계 변화', description: '원유 공급이 불안해질수록 시장은 미래의 부족 가능성을 가격에 반영해 유가를 끌어올립니다.', impact: ['연료비와 에너지 가격이 상승할 수 있습니다.', '기업 비용 부담이 확대될 수 있습니다.', '소비자 물가에도 영향을 줄 수 있습니다.'] },
          { id: 'transport', parent: 'oil', x: 72, y: 41, title: '운송비·생산비 상승', tag: '2단계 변화', description: '기름값이 오르면 물류비와 생산비도 함께 오르기 쉬워집니다.', impact: ['상품 가격 인상 압력이 커질 수 있습니다.', '수입품 가격이 오를 수 있습니다.', '비용 부담이 큰 업종이 영향을 받을 수 있습니다.'] },
          { id: 'inflation', parent: 'transport', x: 65, y: 69, title: '물가 상승 압력', tag: '3단계 변화', description: '에너지와 물류비 상승은 전반적인 물가 압력으로 이어질 수 있습니다.', impact: ['생활비 부담이 커질 수 있습니다.', '실질 구매력이 약해질 수 있습니다.', '체감경기가 둔화될 수 있습니다.'] },
          { id: 'rates', parent: 'inflation', x: 28, y: 76, title: '금리 인하 지연', tag: '마지막 연결', description: '물가가 다시 불안해지면 중앙은행은 금리를 빠르게 내리기 어려워질 수 있습니다.', impact: ['대출 부담이 더 오래 이어질 수 있습니다.', '자산시장 기대가 조정될 수 있습니다.', '가계와 기업의 자금 부담이 커질 수 있습니다.'] }
        ]
      },
      rateHike: {
        bullets: [
          { title: '핵심 사건', text: '기준금리 인상으로 돈을 빌리는 비용이 높아지는 국면입니다.' },
          { title: '가장 직접적인 변화', text: '가계 대출과 기업 자금조달 부담이 커지면서 소비와 투자가 둔화될 가능성이 있습니다.' },
          { title: '거시경제 포인트', text: '경기에는 부담이지만, 물가 안정에는 도움이 될 수 있습니다.' }
        ],
        steps: [
          { id: 'center', type: 'center', x: 38, y: 36, title: '기준금리 인상', tag: '핵심 사건', description: '중앙은행이 돈의 가격을 올리는 조치로, 일반적으로 물가를 안정시키기 위해 사용됩니다.', impact: ['대출 금리 부담이 커질 수 있습니다.', '예금의 상대적 매력이 높아질 수 있습니다.', '자산시장 조정 압력이 생길 수 있습니다.'] },
          { id: 'loan', parent: 'center', x: 68, y: 14, title: '대출금리 상승', tag: '1단계 변화', description: '기준금리가 오르면 은행 대출금리와 회사채 금리도 함께 오를 가능성이 높습니다.', impact: ['주택담보대출 이자 부담이 확대될 수 있습니다.', '기업 차입 비용이 늘어날 수 있습니다.', '부채 비중이 큰 주체의 부담이 커질 수 있습니다.'] },
          { id: 'consume', parent: 'loan', x: 72, y: 41, title: '소비 둔화', tag: '2단계 변화', description: '이자 부담이 늘면 가계는 필수 소비 외 지출을 줄일 가능성이 큽니다.', impact: ['내수 업종 매출이 둔화될 수 있습니다.', '소비심리가 위축될 수 있습니다.', '체감경기가 약해질 수 있습니다.'] },
          { id: 'invest', parent: 'loan', x: 66, y: 69, title: '기업 투자 위축', tag: '3단계 변화', description: '기업은 자금 조달 비용이 높아지면 투자와 신규 프로젝트에 더 신중해집니다.', impact: ['설비투자가 줄어들 수 있습니다.', '채용이 늦춰질 수 있습니다.', '성장률 둔화 우려가 커질 수 있습니다.'] },
          { id: 'inflation', parent: 'consume', x: 26, y: 76, title: '물가 압력 완화', tag: '마지막 연결', description: '수요가 둔화되면 가격을 밀어올리는 힘도 약해져 물가 안정에 도움이 될 수 있습니다.', impact: ['인플레이션 억제 효과가 나타날 수 있습니다.', '경기 둔화와 맞바꾸는 결과가 생길 수 있습니다.', '정책 시점의 중요성이 커질 수 있습니다.'] }
        ]
      },
      fxSpike: {
        bullets: [
          { title: '핵심 사건', text: '환율 상승으로 같은 수입품도 더 비싸게 들어오는 상황입니다.' },
          { title: '가장 직접적인 변화', text: '원자재와 에너지 수입 비용이 오르면서 기업 원가와 생활물가 부담이 커질 수 있습니다.' },
          { title: '거시경제 포인트', text: '수입물가 상승은 국내 물가와 금리 기대에도 영향을 줄 수 있습니다.' }
        ],
        steps: [

          { id: 'imports', parent: 'center', x: 68, y: 14, title: '수입물가 상승', tag: '1단계 변화', description: '같은 해외 상품도 환율이 오르면 원화 기준 가격이 올라갑니다.', impact: ['원자재 가격이 비싸질 수 있습니다.', '소비재 수입 가격이 오를 수 있습니다.', '기업 원가 부담이 확대될 수 있습니다.'] },
          { id: 'energy', parent: 'imports', x: 72, y: 41, title: '에너지 비용 상승', tag: '2단계 변화', description: '원유와 가스처럼 해외에서 들여오는 에너지는 환율 상승의 영향을 특히 크게 받습니다.', impact: ['전기·가스 요금 부담이 커질 수 있습니다.', '생산비가 높아질 수 있습니다.', '가계 생활비에 직접적 영향을 줄 수 있습니다.'] },
          { id: 'inflation', parent: 'energy', x: 66, y: 69, title: '국내 물가 상승 압력', tag: '3단계 변화', description: '수입 원자재와 에너지 가격 상승은 국내 가격 전반을 밀어올릴 수 있습니다.', impact: ['실질소득이 줄어들 수 있습니다.', '체감물가가 높아질 수 있습니다.', '금리 인하 기대가 약해질 수 있습니다.'] },
          { id: 'household', parent: 'inflation', x: 27, y: 76, title: '가계 부담 증가', tag: '마지막 연결', description: '환율은 숫자처럼 보이지만 결국 장보기, 교통비, 공과금 같은 생활비 부담으로 이어질 수 있습니다.', impact: ['소비 여력이 줄어들 수 있습니다.', '필수지출 비중이 높아질 수 있습니다.', '체감경기가 약해질 수 있습니다.'] }
        ]
      },
      tradeSupply: {
        bullets: [
          { title: '핵심 사건', text: '관세, 제재, 공급망 차질로 수출입 흐름이 흔들리는 상황입니다.' },
          { title: '가장 직접적인 변화', text: '부품과 원자재 조달이 어려워지거나 더 비싸져서 생산 차질과 비용 상승이 발생할 수 있습니다.' },
          { title: '거시경제 포인트', text: '무역과 생산이 흔들리면 기업 실적, 물가, 성장률 전망에도 영향을 줄 수 있습니다.' }
        ],
        steps: [
          { id: 'center', type: 'center', x: 38, y: 36, title: '공급망·무역 충격', tag: '핵심 사건', description: '관세, 수출규제, 물류 차질이 생기면 필요한 부품과 원자재를 제때 확보하기 어려워집니다.', impact: ['생산 계획이 흔들릴 수 있습니다.', '수입 비용이 증가할 수 있습니다.', '기업 불확실성이 확대될 수 있습니다.'] },
          { id: 'parts', parent: 'center', x: 68, y: 14, title: '부품·원자재 조달 차질', tag: '1단계 변화', description: '중간재 수급이 꼬이면 생산 공정 전체가 지연될 수 있습니다.', impact: ['납기 지연이 발생할 수 있습니다.', '추가 비용이 생길 수 있습니다.', '대체 공급처 확보 필요성이 커질 수 있습니다.'] },
          { id: 'production', parent: 'parts', x: 72, y: 41, title: '생산 차질', tag: '2단계 변화', description: '필요한 부품이 늦게 오면 생산량이 줄거나 일정이 밀릴 수 있습니다.', impact: ['매출에 타격이 생길 수 있습니다.', '재고 관리가 어려워질 수 있습니다.', '기업 실적 변동성이 커질 수 있습니다.'] },
          { id: 'costs', parent: 'production', x: 66, y: 69, title: '가격 인상 압력', tag: '3단계 변화', description: '부품과 물류 비용이 오르면 기업은 판매가격을 올릴 유인이 커집니다.', impact: ['소비자 가격이 오를 수 있습니다.', '물가 부담이 커질 수 있습니다.', '수요가 둔화될 수 있습니다.'] },
          { id: 'growth', parent: 'costs', x: 27, y: 76, title: '성장 둔화 우려', tag: '마지막 연결', description: '생산과 소비가 함께 약해지면 경기 전반의 성장 흐름도 둔화될 수 있습니다.', impact: ['기업 투자 심리가 약해질 수 있습니다.', '고용에 영향을 줄 수 있습니다.', '시장 전반이 보수적으로 변할 수 있습니다.'] }
        ]
      }
    };

    const screens = {
      home: document.getElementById('screen-home'),
      summary: document.getElementById('screen-summary'),
      mindmap: document.getElementById('screen-mindmap')
    };

    const articleLink = document.getElementById('articleLink');
    const articleTitle = document.getElementById('articleTitle');
    const articleContent = document.getElementById('articleContent');
    const classificationNote = document.getElementById('classificationNote');

    const summaryArticleTitle = document.getElementById('summaryArticleTitle');
    const summaryArticleLink = document.getElementById('summaryArticleLink');
    const bulletList = document.getElementById('bulletList');
    const canvas = document.getElementById('canvas');
    const lineLayer = document.getElementById('lineLayer');
    const stepTag = document.getElementById('stepTag');
    const stepTitle = document.getElementById('stepTitle');
    const stepDescription = document.getElementById('stepDescription');
    const stepImpact = document.getElementById('stepImpact');
    const progressText = document.getElementById('progressText');

    let currentScenario = 'tradeSupply';
    let currentStep = 0;
    let currentArticleMeta = { title: '', link: '' };

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove('active'));
      screens[name].classList.add('active');
    }

    function scoreScenario(text, keywords) {
      let score = 0;
      keywords.forEach(keyword => {
        if (text.includes(keyword)) score += 1;
      });
      return score;
    }

    function detectScenario() {
      const text = `${articleTitle.value} ${articleContent.value} ${articleLink.value}`.toLowerCase();
      const scores = {
        oilWar: scoreScenario(text, ['전쟁', '중동', '유가', '원유', '석유', '공습', '지정학', 'oil', 'crude']),
        rateHike: scoreScenario(text, ['금리', '기준금리', '인상', '연준', 'fomc', '대출', '긴축', 'hawkish']),
        fxSpike: scoreScenario(text, ['환율', '달러', '원달러', '원화', '외환', 'fx', 'usd', '환차손']),
        tradeSupply: scoreScenario(text, ['관세', '무역', '공급망', '수출', '수입', '물류', '제재', '반도체', '부품', 'tariff'])
      };

      let best = 'tradeSupply';
      let maxScore = -1;
      Object.entries(scores).forEach(([key, value]) => {
        if (value > maxScore) {
          maxScore = value;
          best = key;
        }
      });

      if (maxScore <= 0) return 'tradeSupply';
      return best;
    }

    function renderSummary() {
      const template = templates[currentScenario];
      summaryArticleTitle.textContent = currentArticleMeta.title || '제목이 입력되지 않은 기사';
      summaryArticleLink.textContent = currentArticleMeta.link || '';
      bulletList.innerHTML = '';

      template.bullets.forEach(item => {
        const box = document.createElement('div');
        box.className = 'bullet-item';
        box.innerHTML = `
          <div class="bullet-dot"></div>
          <div>
            <strong>${item.title}</strong>
            <p>${item.text}</p>
          </div>
        `;
        bulletList.appendChild(box);
      });
    }

    function createNodeEl(node) {
      const el = document.createElement('div');
      el.className = `map-node ${node.type === 'center' ? 'center' : ''}`;
      el.dataset.id = node.id;
      el.style.left = `${node.x}%`;
      el.style.top = `${node.y}%`;
      el.innerHTML = `<h3>${node.title}</h3><p>${node.tag}</p>`;
      return el;
    }

    function drawLines(visibleSteps) {
      lineLayer.innerHTML = '';
      const areaRect = canvas.getBoundingClientRect();
      lineLayer.setAttribute('viewBox', `0 0 ${areaRect.width} ${areaRect.height}`);

      visibleSteps.forEach(step => {
        if (!step.parent) return;
        const parentEl = canvas.querySelector(`[data-id="${step.parent}"]`);
        const childEl = canvas.querySelector(`[data-id="${step.id}"]`);
        if (!parentEl || !childEl) return;

        const p = parentEl.getBoundingClientRect();
        const c = childEl.getBoundingClientRect();
        const x1 = p.left - areaRect.left + p.width / 2;
        const y1 = p.top - areaRect.top + p.height / 2;
        const x2 = c.left - areaRect.left + c.width / 2;
        const y2 = c.top - areaRect.top + c.height / 2;
        const midX = (x1 + x2) / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#93c5fd');
        path.setAttribute('stroke-width', '2.8');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('opacity', '0.95');
        lineLayer.appendChild(path);
      });
    }

    function renderMindmap() {
      const template = templates[currentScenario];
      const visibleSteps = template.steps.slice(0, currentStep + 1);
      const activeStep = template.steps[currentStep];

      canvas.querySelectorAll('.map-node').forEach(node => node.remove());
      visibleSteps.forEach(step => {
        const el = createNodeEl(step);
        el.classList.add('visible');
        if (step.id === activeStep.id) el.classList.add('current');
        canvas.appendChild(el);
      });

      requestAnimationFrame(() => drawLines(visibleSteps));

      stepTag.textContent = activeStep.tag;
      stepTitle.textContent = activeStep.title;
      stepDescription.textContent = activeStep.description;
      stepImpact.innerHTML = '';
      activeStep.impact.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        stepImpact.appendChild(li);
      });
      progressText.textContent = `${currentStep + 1} / ${template.steps.length} 단계`;
      document.getElementById('prevStep').disabled = currentStep === 0;
      document.getElementById('nextStep').textContent = currentStep === template.steps.length - 1 ? '처음부터 보기' : '다음';
    }

    function analyzeInput() {
      const titleValue = articleTitle.value.trim();
      const contentValue = articleContent.value.trim();
      const linkValue = articleLink.value.trim();

      if (!titleValue && !contentValue) {
        classificationNote.textContent = '기사 제목이나 핵심 내용을 입력해 주세요.';
        return;
      }

      currentScenario = detectScenario();
      currentArticleMeta = {
        title: titleValue || '제목이 입력되지 않은 기사',
        link: linkValue
      };

      const labels = {
        oilWar: '전쟁·원자재 관련 이슈로 분류되었습니다.',
        rateHike: '금리·통화정책 관련 이슈로 분류되었습니다.',
        fxSpike: '환율·외환시장 관련 이슈로 분류되었습니다.',
        tradeSupply: '무역·공급망 관련 이슈로 분류되었습니다.'
      };
      classificationNote.textContent = labels[currentScenario];

      renderSummary();
      showScreen('summary');
    }

    document.getElementById('startAnalysis').addEventListener('click', analyzeInput);
    document.getElementById('backHome1').addEventListener('click', () => showScreen('home'));
    document.getElementById('backHome2').addEventListener('click', () => showScreen('home'));
    document.getElementById('goMindmap').addEventListener('click', () => {
      currentStep = 0;
      renderMindmap();
      showScreen('mindmap');
    });
    document.getElementById('backSummary').addEventListener('click', () => showScreen('summary'));

    document.getElementById('prevStep').addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep -= 1;
        renderMindmap();
      }
    });

    document.getElementById('nextStep').addEventListener('click', () => {
      const total = templates[currentScenario].steps.length;
      if (currentStep < total - 1) {
        currentStep += 1;
      } else {
        currentStep = 0;
      }
      renderMindmap();
    });

    window.addEventListener('resize', () => {
      if (screens.mindmap.classList.contains('active')) renderMindmap();
    });
  </script>
</body>
</html>
